<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kamera Pelupusan</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .loader { border-top-color: #ef4444; animation: spinner 1.5s linear infinite; }
        @keyframes spinner { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="bg-slate-50 text-slate-900">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useRef } = React;

        const App = () => {
            const [image, setImage] = useState(null);
            const [isCameraOpen, setIsCameraOpen] = useState(false);
            const [loading, setLoading] = useState(false);
            const [formData, setFormData] = useState({
                tajuk: '',
                tahun: '',
                bil: '1',
                meter: ''
            });

            const SHEET_URL = "https://docs.google.com/spreadsheets/d/1_CX7JDm7xl-YGGpyZpZnPfYBKou_-TRjtDaFOg4fsl/edit";
            const DRIVE_FOLDER_URL = "https://drive.google.com/drive/folders/18zV8uClYgd-0eZlja9ul6vkRJq4v0mWh";
            const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxCMoXBN84xUKUqlnBf_cU6DfwKMZYi-fW-7zPN41YqTca7v3kfbbsqgFx8J1WzQJ6Log/exec";
            const API_KEY = ""; // Masukkan API Key Gemini jika perlu

            const startCamera = async () => {
                setIsCameraOpen(true);
                try {
                    const stream = await navigator.mediaDevices.getUserMedia({ 
                        video: { facingMode: 'environment' } 
                    });
                    document.getElementById('video').srcObject = stream;
                } catch (err) {
                    alert("Ralat akses kamera: " + err.message);
                    setIsCameraOpen(false);
                }
            };

            const takePhoto = () => {
                const video = document.getElementById('video');
                const canvas = document.createElement('canvas');
                canvas.width = video.videoWidth;
                canvas.height = video.videoHeight;
                canvas.getContext('2d').drawImage(video, 0, 0);
                const dataUrl = canvas.toDataURL('image/png');
                setImage(dataUrl);
                
                // Hentikan kamera
                const stream = video.srcObject;
                stream.getTracks().forEach(track => track.stop());
                setIsCameraOpen(false);

                processImage(dataUrl.split(',')[1]);
            };

            const processImage = async (base64Data) => {
                if (!API_KEY) {
                    console.warn("API Key tiada. AI tidak akan berfungsi.");
                    return;
                }
                setLoading(true);
                try {
                    const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${API_KEY}`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            contents: [{
                                parts: [
                                    { text: "Ekstrak tajuk buku dalam Jawi, BM dan BI. Format: [Jawi] | [BM] | [BI]" },
                                    { inlineData: { mimeType: "image/png", data: base64Data } }
                                ]
                            }]
                        })
                    });
                    const result = await response.json();
                    const text = result.candidates?.[0]?.content?.parts?.[0]?.text || '';
                    setFormData(prev => ({ ...prev, tajuk: text.trim() }));
                } catch (err) {
                    console.error(err);
                } finally {
                    setLoading(false);
                }
            };

            const handleSave = async () => {
                if (!formData.tajuk) return alert("Sila masukkan tajuk.");
                setLoading(true);
                try {
                    await fetch(SCRIPT_URL, {
                        method: 'POST',
                        mode: 'no-cors',
                        body: JSON.stringify(formData)
                    });
                    alert("Rekod berjaya disimpan!");
                    setFormData({ tajuk: '', tahun: '', bil: '1', meter: '' });
                    setImage(null);
                } catch (err) {
                    alert("Ralat simpan data.");
                } finally {
                    setLoading(false);
                }
            };

            return (
                <div className="min-h-screen pb-12">
                    <header className="bg-white border-b p-4 flex justify-between items-center sticky top-0 z-20">
                        <div className="flex items-center gap-2">
                            <i className="fa-solid fa-camera text-red-600 text-xl"></i>
                            <h1 className="font-black uppercase tracking-tighter text-xl">
                                Kamera <span className="text-red-600">Pelupusan</span>
                            </h1>
                        </div>
                        <a href={SHEET_URL} target="_blank" className="text-slate-400 hover:text-green-600">
                            <i className="fa-solid fa-file-excel text-xl"></i>
                        </a>
                    </header>

                    <main className="max-w-md mx-auto p-4 space-y-6">
                        <div className="bg-white rounded-2xl shadow-sm border overflow-hidden relative">
                            <div className="aspect-[4/3] bg-slate-100 flex items-center justify-center overflow-hidden">
                                {isCameraOpen ? (
                                    <video id="video" autoPlay playsInline className="w-full h-full object-cover" />
                                ) : image ? (
                                    <img src={image} className="w-full h-full object-cover" />
                                ) : (
                                    <div className="text-center text-slate-400">
                                        <i className="fa-solid fa-image text-4xl mb-2"></i>
                                        <p className="text-xs font-bold uppercase tracking-widest">Sedia Imbas</p>
                                    </div>
                                )}
                                
                                {loading && (
                                    <div className="absolute inset-0 bg-white/80 flex flex-col items-center justify-center">
                                        <div className="loader ease-linear rounded-full border-4 border-t-4 border-slate-200 h-12 w-12 mb-4"></div>
                                        <p className="font-black text-xs uppercase tracking-widest animate-pulse">Memproses...</p>
                                    </div>
                                )}
                            </div>

                            <div className="p-4">
                                {!isCameraOpen ? (
                                    <button onClick={startCamera} className="w-full bg-slate-900 text-white font-black py-4 rounded-xl flex items-center justify-center gap-2">
                                        <i className="fa-solid fa-video"></i> BUKA KAMERA
                                    </button>
                                ) : (
                                    <button onClick={takePhoto} className="w-full bg-red-600 text-white font-black py-4 rounded-xl flex items-center justify-center gap-2">
                                        <i className="fa-solid fa-circle"></i> AMBIL GAMBAR
                                    </button>
                                )}
                            </div>
                        </div>

                        <div className="bg-white p-5 rounded-2xl border space-y-4 shadow-sm">
                            <div>
                                <label className="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-1 block">Tajuk Rekod (Jawi/BM/BI)</label>
                                <textarea 
                                    value={formData.tajuk} 
                                    onChange={(e) => setFormData({...formData, tajuk: e.target.value})}
                                    rows="3" className="w-full p-3 bg-slate-50 border rounded-xl outline-none focus:border-red-500 font-bold" 
                                />
                            </div>
                            <div className="grid grid-cols-2 gap-4">
                                <div>
                                    <label className="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-1 block">Tahun</label>
                                    <input type="text" value={formData.tahun} onChange={(e) => setFormData({...formData, tahun: e.target.value})} className="w-full p-3 bg-slate-50 border rounded-xl outline-none" placeholder="1994" />
                                </div>
                                <div>
                                    <label className="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-1 block">Bilangan</label>
                                    <input type="number" value={formData.bil} onChange={(e) => setFormData({...formData, bil: e.target.value})} className="w-full p-3 bg-slate-50 border rounded-xl outline-none" />
                                </div>
                            </div>
                            <div>
                                <label className="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-1 block">Meter / Jumlah</label>
                                <input type="text" value={formData.meter} onChange={(e) => setFormData({...formData, meter: e.target.value})} className="w-full p-3 bg-slate-50 border rounded-xl outline-none" />
                            </div>
                            <button onClick={handleSave} className="w-full bg-red-600 text-white font-black py-4 rounded-xl shadow-lg shadow-red-100 uppercase tracking-widest">
                                <i className="fa-solid fa-save mr-2"></i> Simpan Rekod
                            </button>
                        </div>

                        <div className="text-center">
                            <a href={DRIVE_FOLDER_URL} target="_blank" className="text-[10px] font-black text-slate-400 uppercase underline tracking-widest">
                                Buka Folder Drive
                            </a>
                        </div>
                    </main>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
